<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント出欠送信</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="formContent">
        <h1>2026年6月1日<br>イベント出欠確認</h1>
        <p class="desc">お名前を入力して送信してください。</p>

        <form id="attendanceForm">
            <!-- お名前 -->
            <div class="input-group">
                <label class="label-title">お名前</label>
                <input type="text" id="name" placeholder="例：田中 太郎" required>
            </div>

            <!-- 出欠 -->
            <div class="input-group">
                <label class="label-title">ご出欠</label>
                <div class="radio-group">
                    <label><input type="radio" name="status" value="出席" required> 出席</label>
                    <label><input type="radio" name="status" value="欠席"> 欠席</label>
                </div>
            </div>

            <!-- 人数（出席時のみ表示） -->
            <div class="input-group" id="peopleArea">
                <label class="label-title">参加人数（ご本人含む）</label>
                <input type="number" id="count" min="1" value="1">
            </div>

            <button type="submit" id="submitBtn">回答を送信する</button>
        </form>
    </div>

    <!-- 送信完了後の表示 -->
    <div id="successMsg">
        <div class="success-icon">✓</div>
        <h2>送信が完了しました</h2>
        <p>回答ありがとうございます。<br>内容は管理者に届きました。</p>
        <button onclick="location.reload()" class="back-btn">続けて別の回答を送る</button>
    </div>
</div>

<script>
    const form = document.getElementById('attendanceForm');
    const peopleArea = document.getElementById('peopleArea');
    const radios = document.getElementsByName('status');

    // ラジオボタンの切り替えで人数欄を表示/非表示
    radios.forEach(r => {
        r.addEventListener('change', () => {
            peopleArea.style.display = (r.value === '出席') ? 'block' : 'none';
        });
    });

    // 送信処理
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "送信中...";

        const nameValue = document.getElementById('name').value;
        const statusValue = document.querySelector('input[name="status"]:checked').value;
        const countValue = (statusValue === '出席') ? document.getElementById('count').value : "0";

        const formData = new FormData();
        // あなたのフォームIDに合わせて設定済み
        formData.append("entry.1983265203", nameValue);   
        formData.append("entry.134308966", statusValue); 
        formData.append("entry.1747802878", countValue); 

        fetch("https://docs.google.com/forms/d/e/1FAIpQLSd5PFGcJF6fP8tjGJm18DbwIGMVSd_wGfu9mSgyy5zNP-leqA/formResponse", {
            method: "POST",
            mode: "no-cors",
            body: formData
        }).then(() => {
            // フォームを隠して完了メッセージを表示
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        }).catch(err => {
            alert("エラーが発生しました。");
            btn.disabled = false;
            btn.textContent = "回答を送信する";
        });
    });
</script>

</body>
</html>

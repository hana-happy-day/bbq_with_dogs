<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出欠送信</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="formContent">
        <h1>2026年5月31日<br>BBQ出欠確認</h1>
        <h2>締切 5/21　20：00</h2>

        <form id="attendanceForm">

            <!-- お名前 -->
            <div class="input-group">
                <label class="label-title">お名前</label>
                <input type="text"
                       id="name"
                       placeholder="例：華"
                       required>
            </div>

            <!-- 出欠 -->
            <div class="input-group">
                <label class="label-title">ご出欠</label>

                <div class="radio-group">
                    <label>
                        <input type="radio"
                               name="status"
                               value="出席"
                               required>
                        出席
                    </label>

                    <label>
                        <input type="radio"
                               name="status"
                               value="欠席">
                        欠席
                    </label>
                </div>
            </div>

            <!-- 人数 -->
            <div class="input-group" id="peopleArea">
                <label class="label-title">
                    参加人数（にんげん）
                </label>

                <input type="number"
                       id="count"
                       min="1"
                       value="1">
            </div>

            <button type="submit" id="submitBtn">
                回答を送信する
            </button>

        </form>
    </div>

    <!-- 完了画面 -->
    <div id="successMsg" style="display:none;">
        <div class="success-icon">✓</div>

        <h2>送信完了</h2>

        <p>
            回答ありがとうございます。<br>
            あとでLINEします。<br>
            <B>2日以内にLINE来なかったら華のママまで連絡ください！</B>
        </p>

        <button onclick="location.reload()" class="back-btn">
            戻る
        </button>
    </div>

</div>

<script>

const form = document.getElementById('attendanceForm');
const peopleArea = document.getElementById('peopleArea');
const radios = document.getElementsByName('status');


// 初期状態で人数欄を非表示
peopleArea.style.display = "none";


// 出席時のみ人数表示
Array.from(radios).forEach(radio => {

    radio.addEventListener('change', () => {

        if (radio.value === '出席' && radio.checked) {
            peopleArea.style.display = "block";
        } else if (radio.value === '欠席' && radio.checked) {
            peopleArea.style.display = "none";
        }

    });

});


// 送信処理
form.addEventListener('submit', function(e){

    e.preventDefault();

    const btn = document.getElementById('submitBtn');

    btn.disabled = true;
    btn.textContent = "送信中...";


    const nameValue =
        document.getElementById('name').value;

    const statusValue =
        document.querySelector(
            'input[name="status"]:checked'
        ).value;

    const countValue =
        (statusValue === '出席')
        ? String(document.getElementById('count').value)
        : "0";


    const formData = new FormData();

    // 名前
    formData.append(
        "entry.2066347943",
        nameValue
    );

    // 出欠
    formData.append(
        "entry.1741364705",
        statusValue
    );

    // 人数
    formData.append(
        "entry.1116429430",
        countValue
    );


 fetch(
    "https://docs.google.com/forms/d/e/1FAIpQLSdewAA0GrH2gUkbZ4gZ-v8virJZFzH282NjzF0eJy3grRRkTw/formResponse",
    {
        method: "POST",
        mode: "no-cors",
        body: formData
    }
)

.then(() => {

    document.getElementById('formContent').style.display = 'none';

    document.getElementById('successMsg').style.display = 'block';

})
    .catch(() => {

        alert("送信エラー！華のママへLINEください");

        btn.disabled = false;
        btn.textContent = "回答を送信する";

    });

});

</script>

</body>
</html>
